# ============================================
# 业务规则（Business Rules）
# ============================================
business_rules:
  - id: BR001
    rule: "手机号必须为11位数字，且以1开头"
    type: data_rule
    source: "需求文档 4.1 节"
    confidence: high
    relates_to: [F001, F002]

  - id: BR002
    rule: "同一手机号只能注册一个账号"
    type: data_rule
    source: "需求文档 4.1 节"
    confidence: high
    relates_to: [F001, F002]

  - id: BR003
    rule: "密码长度必须为8-20位"
    type: data_rule
    source: "需求文档 4.2 节"
    confidence: high
    relates_to: [F001, F002]

  - id: BR004
    rule: "密码必须包含字母和数字"
    type: data_rule
    source: "需求文档 4.2 节"
    confidence: high
    relates_to: [F001, F002]

  - id: BR005
    rule: "密码不能包含手机号"
    type: data_rule
    source: "需求文档 4.2 节"
    confidence: high
    relates_to: [F001, F002]

  - id: BR006
    rule: "用户连续输错密码3次，账号锁定30分钟"
    type: process_rule
    source: "需求文档 4.3 节"
    confidence: high
    relates_to: [F001]

  - id: BR007
    rule: "验证码5分钟内有效"
    type: process_rule
    source: "需求文档 4.3 节"
    confidence: high
    relates_to: [F002]

  - id: BR008
    rule: "验证码同一手机号每天最多发送10次"
    type: process_rule
    source: "需求文档 4.3 节"
    confidence: high
    relates_to: [F002]

