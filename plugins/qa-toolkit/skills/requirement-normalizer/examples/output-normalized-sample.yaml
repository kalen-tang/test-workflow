fields:
  - name: "mobile"
    display_name: "手机号"
    type: string
    format: "11位数字，以1开头"
    required: true
    rules: [BR001, BR002]
    source: "需求文档 5 节"

  - name: "password"
    display_name: "密码"
    type: string
    format: "8-20位，字母+数字，不包含手机号"
    required: true
    rules: [BR003, BR004, BR005]
    source: "需求文档 5 节"

  - name: "remember_me"
    display_name: "记住密码"
    type: boolean
    format: "true/false"
    required: false
    rules: []
    source: "需求文档 5 节"

  - name: "sms_code"
    display_name: "短信验证码"
    type: string
    format: "6位数字"
    required: true                    # 仅在密码重置时必填
    rules: [BR007, BR008]
    source: "需求文档 5 节"

