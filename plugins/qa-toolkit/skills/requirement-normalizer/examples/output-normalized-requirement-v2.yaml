      source: "PRD 第6章 6.2节"

    - id: EXT002
      category: "复用设计"
      description: "抽取消费券发放、查询、使用的核心逻辑做成通用能力，后续其他类型的券（如积分券、兑换券）可以复用"
      source: "PRD 第6章 6.2节"

