# ============================================
# 第 1 章：需求背景与目标（回答"为什么做"）
# ============================================
background_and_objectives:
  pain_points:
    - description: "当前卡消费回赠券仅支持 Debit 卡消费场景，Credit 卡用户无法享受消费回赠优惠"
      data_support: "2024 年 Q4 Credit 卡用户占比达 35%，但消费回赠活动参与率仅为 12%，远低于 Debit 卡用户的 58%"
      source: "PRD 第1章 1.1节"
      confidence: high

    - description: "Credit 卡消费金额占总消费额的 42%，但未能有效通过消费回赠活动激活"
      data_support: "2024 年 Q4 Credit 卡消费额 4.2 亿港币，Debit 卡消费额 5.8 亿港币"
      source: "PRD 第1章 1.1节"
      confidence: high

  objectives:
    - description: "Credit 卡支持消费回赠后，Credit 卡用户活动参与率提升至 40% 以上"
      metric: "Credit 卡用户活动参与率 >= 40%"
      baseline: "当前 12%"
      target: "40%"
      source: "PRD 第1章 1.2节"
      confidence: high

    - description: "Credit 卡月均消费笔数提升 20%"
      metric: "Credit 卡月均消费笔数增长率 >= 20%"
      baseline: "当前月均 15 万笔"
      target: "18 万笔"
      source: "PRD 第1章 1.2节"
      confidence: high

# ============================================
# 第 2 章：专业术语表（避免歧义）
# ============================================
glossary:
  - term: "消费回赠券"
    full_name: "Consumption Voucher"
    definition: "用户在指定商户消费后，系统自动发放的优惠券，可在下次消费时抵扣"
    source: "PRD 第2章"

  - term: "Debit 卡"
    full_name: "Debit Card"
    definition: "借记卡，用户消费时直接从账户余额扣款"
    source: "PRD 第2章"

  - term: "Credit 卡"
    full_name: "Credit Card"
    definition: "信用卡，用户消费时先透支，后还款"
    source: "PRD 第2章"

  - term: "消费回赠比例"
    full_name: "Cashback Ratio"
    definition: "消费金额的百分比，用于计算回赠券金额。例如：消费 100 港币，回赠比例 5%，则回赠券金额为 5 港币"
    source: "PRD 第2章"

  - term: "合资格商户"
    full_name: "Eligible Merchant"
    definition: "参与消费回赠活动的商户，由运营团队配置"
    source: "PRD 第2章"

# ============================================
# 第 3 章：业务逻辑与功能需求（回答"做什么"）
# ============================================
business_logic_and_functional_requirements:

  # 3.1 关键业务流程
  key_business_flows:
    - id: FLOW001
      name: "Credit 卡消费回赠流程"
      description: "用户使用 Credit 卡在合资格商户消费后，系统自动发放消费回赠券"
      flow_diagram: "详见附件：Credit卡消费回赠流程图.png"
      steps:
        - step: 1
          action: "用户在合资格商户使用 Credit 卡消费"
          actor: "用户"
          detail: "消费金额 >= 100 HKD"

        - step: 2
          action: "支付系统推送消费事件"
          actor: "支付系统"
          detail: "包含卡类型、消费金额、商户信息"

        - step: 3
          action: "消费回赠服务校验消费条件"
          actor: "消费回赠服务"
          detail: "检查：卡类型=Credit、商户是否合资格、消费金额是否达标"

        - step: 4
          action: "计算回赠券金额"
          actor: "消费回赠服务"
          detail: "回赠金额 = 消费金额 × 回赠比例（5%）"

        - step: 5
          action: "发放消费回赠券"
          actor: "消费回赠服务"
          detail: "创建消费券记录，状态为 ACTIVE"

        - step: 6
          action: "发送 Push 通知"
          actor: "通知服务"
          detail: "通知用户获得消费回赠券"

        - step: 7
          action: "用户查看消费券"
          actor: "用户"
          detail: "在 App 消费券列表查看"

      source: "PRD 第3章 3.1节"

    - id: FLOW002
      name: "Credit 卡消费券使用流程"
      description: "用户使用 Credit 卡消费券进行下次消费"
      flow_diagram: "详见附件：Credit卡消费券使用流程图.png"
      steps:
        - step: 1
          action: "用户发起消费"
          actor: "用户"
          detail: "选择使用消费券"

        - step: 2
          action: "系统校验消费券"
          actor: "消费回赠服务"
          detail: "检查：消费券是否有效、是否过期、消费金额是否符合"

        - step: 3
          action: "抵扣消费金额"
          actor: "支付系统"
          detail: "实际支付金额 = 消费金额 - 消费券金额"

        - step: 4
          action: "更新消费券状态"
          actor: "消费回赠服务"
          detail: "状态改为 USED"

        - step: 5
          action: "发送使用成功通知"
          actor: "通知服务"

      source: "PRD 第3章 3.1节"

  # 3.2 功能需求
  features:
    - id: F001
      name: "Credit 卡消费回赠发放"
      description: |
        用户使用 Credit 卡在合资格商户消费后，系统自动根据消费金额计算并发放消费回赠券。

        核心规则：
        - 卡类型：仅支持 Credit 卡
        - 消费金额：>= 100 HKD
        - 回赠比例：5%
        - 合资格商户：由运营团队配置
        - 发放时机：消费成功后 5 分钟内
      applicable_scope: "Credit 卡用户"
      priority: high
      test_focus: true
      risk_level: high
      related_interfaces:
        - "/voucher/issue"
        - "/payment/event"
      related_flows: [FLOW001]
      source: "PRD 第3章 3.2节 功能1"
      confidence: high

    - id: F002
      name: "Credit 卡消费券查询"
      description: |
        用户可以在 App 中查询自己的 Credit 卡消费券列表，包括：
        - 有效消费券（ACTIVE）
        - 已使用消费券（USED）
        - 已过期消费券（EXPIRED）

        展示信息：
        - 消费券金额
        - 有效期
        - 使用条件
        - 消费券来源（哪次消费获得）
      applicable_scope: "Credit 卡用户"
      priority: high
      test_focus: true
      risk_level: medium
      related_interfaces:
        - "/voucher/list"
      related_flows: []
      source: "PRD 第3章 3.2节 功能2"
      confidence: high

    - id: F003
      name: "Credit 卡消费券使用"
      description: |
        用户在消费时可以选择使用 Credit 卡消费券进行抵扣。

        核心规则：
        - 一次消费只能使用一张消费券
        - 消费金额必须 >= 消费券金额（不支持部分使用）
        - 消费券有效期内才能使用
        - 使用后消费券状态变为 USED
      applicable_scope: "Credit 卡用户"
      priority: high
      test_focus: true
      risk_level: high
      related_interfaces:
        - "/voucher/use"
        - "/payment/deduct"
      related_flows: [FLOW002]
      source: "PRD 第3章 3.2节 功能3"
      confidence: high

    - id: F004
      name: "消费券过期处理"
      description: |
        系统定时任务每天凌晨 1 点扫描过期消费券，将状态从 ACTIVE 改为 EXPIRED。

        过期规则：
        - 消费券有效期：30 天
        - 过期后不可使用
        - 过期消费券在列表中保留 90 天后删除
      applicable_scope: "系统定时任务"
      priority: medium
      test_focus: false
      risk_level: low
      related_interfaces:
        - "/voucher/expire"
      related_flows: []
      source: "PRD 第3章 3.2节 功能4"
      confidence: high

  # 3.3 界面需求
  ui_requirements:
    - id: UI001
      scene: "消费券列表页"
      description: |
        界面元素：
        1. 标题：我的消费券
        2. Tab 切换：全部 / 有效 / 已使用 / 已过期
        3. 消费券卡片：
           - 左侧：消费券金额（大号字体）
           - 右侧：有效期、使用条件、来源
           - 按钮：立即使用（ACTIVE）/ 已使用（USED）/ 已过期（EXPIRED）
        4. 空状态：暂无消费券，快去消费赚取吧！
        5. 下拉刷新
        6. 上拉加载更多
      screenshot: "详见附件：消费券列表页.png"
      source: "PRD 第3章 3.3节"

    - id: UI002
      scene: "消费券详情页"
      description: |
        界面元素：
        1. 返回按钮
        2. 消费券金额（大号字体，中心展示）
        3. 有效期：YYYY年MM月DD日 23:59
        4. 使用条件：单笔消费满 XX 元可用
        5. 来源：YYYY年MM月DD日 在 XX 商户消费获得
        6. 使用说明：
           - 本消费券仅限 Credit 卡使用
           - 一次消费只能使用一张消费券
           - 消费券不可转赠
        7. 底部按钮：立即使用 / 已使用 / 已过期
      screenshot: "详见附件：消费券详情页.png"
      source: "PRD 第3章 3.3节"

  # 3.4 通知需求
  notification_requirements:
    - id: NOTIF001
      scene: "获得消费回赠券"
      channels: ["Push", "Email"]
      template_id: "NOTIF_VOUCHER_ISSUED"
      content:
        title_zh_cn: "恭喜！您获得了消费回赠券"
        title_zh_hk: "恭喜！您獲得了消費回贈券"
        title_en: "Congratulations! You've earned a voucher"
        body_zh_cn: "您在 {merchant_name} 消费 {amount} HKD，获得 {voucher_amount} HKD 消费券，有效期至 {expire_date}"
        body_zh_hk: "您在 {merchant_name} 消費 {amount} HKD，獲得 {voucher_amount} HKD 消費券，有效期至 {expire_date}"
        body_en: "You spent {amount} HKD at {merchant_name} and earned a {voucher_amount} HKD voucher, valid until {expire_date}"
      source: "PRD 第3章 3.4节"

    - id: NOTIF002
      scene: "消费券即将过期"
      channels: ["Push"]
      template_id: "NOTIF_VOUCHER_EXPIRING"
      send_rule: "过期前 3 天发送提醒"
      content:
        title_zh_cn: "消费券即将过期"
        title_zh_hk: "消費券即將過期"
        title_en: "Your voucher is expiring soon"
        body_zh_cn: "您的 {voucher_amount} HKD 消费券将在 {days} 天后过期，记得使用哦"
        body_zh_hk: "您的 {voucher_amount} HKD 消費券將在 {days} 天後過期，記得使用哦"
        body_en: "Your {voucher_amount} HKD voucher will expire in {days} days, don't forget to use it"
      source: "PRD 第3章 3.4节"

    - id: NOTIF003
      scene: "消费券使用成功"
      channels: ["Push"]
      template_id: "NOTIF_VOUCHER_USED"
      content:
        title_zh_cn: "消费券使用成功"
        title_zh_hk: "消費券使用成功"
        title_en: "Voucher used successfully"
        body_zh_cn: "您已使用 {voucher_amount} HKD 消费券，实际支付 {actual_amount} HKD"
        body_zh_hk: "您已使用 {voucher_amount} HKD 消費券，實際支付 {actual_amount} HKD"
        body_en: "You've used a {voucher_amount} HKD voucher, actual payment {actual_amount} HKD"
      source: "PRD 第3章 3.4节"

  # 3.5 后台管理与 CS/OPS 需求
  backend_ops_requirements:
    - id: OPS001
      category: "合资格商户配置"
      description: "运营人员可以在后台配置参与消费回赠活动的商户列表"
      config_table:
        - merchant_id: "M001"
          merchant_name: "7-Eleven"
          enabled: true
          cashback_ratio: "5%"
        - merchant_id: "M002"
          merchant_name: "屈臣氏"
          enabled: true
          cashback_ratio: "5%"
        - merchant_id: "M003"
          merchant_name: "百佳超市"
          enabled: false
          cashback_ratio: "0%"
      source: "PRD 第3章 3.5节"

    - id: OPS002
      category: "消费回赠比例配置"
      description: "运营人员可以调整消费回赠比例（全局配置）"
      config_fields:
        - field: "credit_cashback_ratio"
          default_value: "5%"
          min_value: "1%"
          max_value: "10%"
          description: "Credit 卡消费回赠比例"
      source: "PRD 第3章 3.5节"

    - id: OPS003
      category: "消费券查询"
      description: "CS 人员可以根据用户 ID 查询用户的消费券列表，协助用户解决问题"
      query_fields:
        - "用户 ID"
        - "消费券状态"
        - "时间范围"
      source: "PRD 第3章 3.5节"

  # 3.6 Finance 需求
  finance_requirements:
    - id: FIN001
      description: |
        消费回赠券涉及资金流转，需要申请 GL 账户并明确记账规则：

        借贷关系：
        - 发放消费券时：借：营销费用，贷：应付消费券
        - 使用消费券时：借：应付消费券，贷：收入
        - 过期消费券时：借：应付消费券，贷：营销费用冲回
      gl_account: "6001001（营销费用）、2001001（应付消费券）"
      accounting_rules: |
        1. 发放消费券：DR 6001001, CR 2001001
        2. 使用消费券：DR 2001001, CR 4001001
        3. 过期消费券：DR 2001001, CR 6001001
      reconciliation_rule: "每月月底对账，确保应付消费券余额 = 系统中 ACTIVE 状态消费券总额"
      source: "PRD 第3章 3.6节"

  # 3.7 MMO、账户状态、风控需求
  mmo_risk_requirements:
    - id: MMO001
      description: "消费券使用涉及新的交易类型，需要申请 MMO"
      transaction_type: "VOUCHER_USE"
      mmo_code: "MMO_VOUCHER_001"
      account_status_restrictions:
        - "账户状态必须为 ACTIVE"
        - "账户状态为 FROZEN 时不允许使用消费券"
      customer_status_restrictions:
        - "客户状态必须为 NORMAL"
        - "客户状态为 BLACKLIST 时不允许使用消费券"
      risk_control_rules:
        - "单笔消费使用消费券金额不超过 500 HKD"
        - "单日使用消费券次数不超过 10 次"
        - "单月使用消费券总额不超过 5000 HKD"
      fcc_requirements:
        - "消费券使用需要风控审核"
        - "高风险用户使用消费券时需要二次验证"
      source: "PRD 第3章 3.7节"

  # 3.8 文案
  copywriting:
    - id: COPY001
      scene: "消费券列表页-空状态"
      screenshot: ""
      simplified_chinese: "暂无消费券\n快去消费赚取吧！"
      traditional_chinese: "暫無消費券\n快去消費賺取吧！"
      english: "No vouchers yet\nStart shopping to earn!"
      source: "PRD 第3章 3.8节"

    - id: COPY002
      scene: "消费券详情页-使用说明"
      simplified_chinese: |
        使用说明：
        • 本消费券仅限 Credit 卡使用
        • 一次消费只能使用一张消费券
        • 消费券不可转赠
        • 消费券过期后自动失效
      traditional_chinese: |
        使用說明：
        • 本消費券僅限 Credit 卡使用
        • 一次消費只能使用一張消費券
        • 消費券不可轉贈
        • 消費券過期後自動失效
      english: |
        Terms of Use:
        • This voucher is only valid for Credit card transactions
        • Only one voucher can be used per transaction
        • Vouchers are non-transferable
        • Vouchers expire automatically after the expiry date
      source: "PRD 第3章 3.8节"

    - id: COPY003
      scene: "消费券使用-错误提示"
      simplified_chinese: "消费金额不足，无法使用此消费券"
      traditional_chinese: "消費金額不足，無法使用此消費券"
      english: "Insufficient transaction amount to use this voucher"
      source: "PRD 第3章 3.8节"

# ============================================
# 第 4 章：非功能需求
# ============================================
non_functional_requirements:

  # 4.1 性能需求
  performance:
    - id: PERF001
      category: "响应时间"
      metric: "消费券发放响应时间 < 2秒"
      source: "PRD 第4章 4.1节"

    - id: PERF002
      category: "响应时间"
      metric: "消费券查询响应时间 < 500ms"
      source: "PRD 第4章 4.1节"

    - id: PERF003
      category: "响应时间"
      metric: "消费券使用响应时间 < 1秒"
      source: "PRD 第4章 4.1节"

    - id: PERF004
      category: "吞吐"
      metric: "峰值时段支持 10000 用户同时查询消费券"
      source: "PRD 第4章 4.1节"

    - id: PERF005
      category: "吞吐"
      metric: "系统吞吐 > 500TPS（消费券发放）"
      source: "PRD 第4章 4.1节"

  # 4.2 数据与埋点
  data_tracking:
    - id: TRACK001
      page: "消费券列表页"
      event_name: "page_view_voucher_list"
      event_properties:
        - "user_id"
        - "card_type"
        - "voucher_count"
      source: "PRD 第4章 4.2节"

    - id: TRACK002
      page: "消费券详情页"
      event_name: "page_view_voucher_detail"
      event_properties:
        - "user_id"
        - "voucher_id"
        - "voucher_amount"
        - "voucher_status"
      source: "PRD 第4章 4.2节"

    - id: TRACK003
      page: "消费券列表页"
      event_name: "click_use_voucher"
      event_properties:
        - "user_id"
        - "voucher_id"
        - "voucher_amount"
      source: "PRD 第4章 4.2节"

    - id: TRACK004
      page: "支付页"
      event_name: "voucher_use_success"
      event_properties:
        - "user_id"
        - "voucher_id"
        - "voucher_amount"
        - "transaction_amount"
        - "actual_amount"
      source: "PRD 第4章 4.2节"

  # 4.3 开关控制
  feature_toggle:
    - id: TOGGLE001
      code: "CreditVoucherEnabled"
      name: "Credit 卡消费回赠功能开关"
      default_status: "关闭"
      location: "LCS后管>系统管理>开关管理"
      description: "开关关闭时，Credit 卡消费不发放消费券，已发放的消费券仍可使用"
      source: "PRD 第4章 4.3节"

    - id: TOGGLE002
      code: "VoucherExpiryReminderEnabled"
      name: "消费券过期提醒开关"
      default_status: "开启"
      location: "LCS后管>系统管理>开关管理"
      description: "开关关闭时，不发送消费券过期提醒 Push"
      source: "PRD 第4章 4.3节"

  # 4.4 App 版本更新机制
  app_version_update:
    - id: VERSION001
      version_number: "V3.8.0 及更早"
      update_strategy: "强制升级原生版本"
      user_experience: "打开 App 后即弹窗提示需要升级到最新原生版本，更新前无法使用任何功能"
      reason: "老版本 App 不支持 Credit 卡消费券功能"
      source: "PRD 第4章 4.4节"

    - id: VERSION002
      version_number: "V3.8.1 ~ V3.8.4"
      update_strategy: "强制热更新"
      user_experience: "App 进入消费券页面后即强制进行热更新，Loading 成功后进入最新版本功能"
      test_requirement: "需要测试 4个版本 * 2类设备（Android+iOS）"
      source: "PRD 第4章 4.4节"

    - id: VERSION003
      version_number: "V3.8.5（最新版本）"
      update_strategy: "原生发布"
      user_experience: "原生支持 Credit 卡消费券功能"
      release_date: "预计 2025-06-01 在 AppStore 等应用市场过审后全面放开"
      source: "PRD 第4章 4.4节"

# ============================================
# 第 5 章：验收标准（回答"怎样算做好"）
# ============================================
acceptance_criteria:
  - id: AC001
    functional_point: "Credit 卡消费回赠发放"
    given: "用户使用 Credit 卡在合资格商户消费 200 HKD"
    when: "消费成功后 5 分钟内"
    then: "系统自动发放 10 HKD（5%）消费回赠券，状态为 ACTIVE"
    metric: "发放成功率 >= 99%"
    source: "PRD 第5章"
    confidence: high

  - id: AC002
    functional_point: "Credit 卡消费券查询"
    given: "用户拥有 3 张 ACTIVE 消费券、2 张 USED 消费券"
    when: "用户打开消费券列表页"
    then: "全部 Tab 显示 5 张消费券，有效 Tab 显示 3 张消费券，已使用 Tab 显示 2 张消费券"
    metric: "查询响应时间 < 500ms"
    source: "PRD 第5章"
    confidence: high

  - id: AC003
    functional_point: "Credit 卡消费券使用"
    given: "用户拥有一张 50 HKD 的消费券，消费金额为 100 HKD"
    when: "用户选择使用消费券并完成支付"
    then: "实际支付 50 HKD，消费券状态变为 USED"
    metric: "使用成功率 >= 98%"
    source: "PRD 第5章"
    confidence: high

  - id: AC004
    functional_point: "消费券过期处理"
    given: "系统中存在 100 张过期的消费券（ACTIVE 状态，有效期已过）"
    when: "定时任务在每天凌晨 1 点执行"
    then: "100 张消费券状态全部变为 EXPIRED"
    metric: "过期处理准确率 = 100%"
    source: "PRD 第5章"
    confidence: high

  - id: AC005
    functional_point: "消费券即将过期提醒"
    given: "用户拥有一张消费券，距离过期还有 3 天"
    when: "定时任务在每天上午 10 点执行"
    then: "用户收到 Push 提醒'您的消费券将在 3 天后过期'"
    metric: "提醒发送成功率 >= 95%"
    source: "PRD 第5章"
    confidence: high

# ============================================
# 测试场景（Scenarios）- 从验收标准生成
# ============================================
scenarios:
  # Credit 卡消费回赠发放 - 正向场景
  - id: S001
    name: "正常发放-Credit卡合资格商户消费"
    type: positive
    relates_to: AC001
    given: "用户使用 Credit 卡在 7-Eleven（合资格商户）消费 200 HKD"
    when: "消费成功后 5 分钟"
    then: "系统自动发放 10 HKD 消费券，状态为 ACTIVE，有效期为 30 天，用户收到 Push 通知"
    source: requirement
    confidence: high

  # Credit 卡消费回赠发放 - 负向场景
  - id: S002
    name: "异常发放-消费金额不足"
    type: negative
    relates_to: AC001
    given: "用户使用 Credit 卡在 7-Eleven 消费 50 HKD（< 100 HKD）"
    when: "消费成功后"
    then: "系统不发放消费券"
    source: supplement
    confidence: medium

  - id: S003
    name: "异常发放-非合资格商户"
    type: negative
    relates_to: AC001
    given: "用户使用 Credit 卡在百佳超市（非合资格商户）消费 200 HKD"
    when: "消费成功后"
    then: "系统不发放消费券"
    source: supplement
    confidence: medium

  - id: S004
    name: "异常发放-Debit卡消费"
    type: negative
    relates_to: AC001
    given: "用户使用 Debit 卡在 7-Eleven 消费 200 HKD"
    when: "消费成功后"
    then: "系统按原有逻辑发放 Debit 卡消费券（不是本需求范围）"
    source: supplement
    confidence: high

  # Credit 卡消费券查询 - 正向场景
  - id: S005
    name: "正常查询-有消费券"
    type: positive
    relates_to: AC002
    given: "用户拥有 3 张 ACTIVE 消费券、2 张 USED 消费券、1 张 EXPIRED 消费券"
    when: "用户打开消费券列表页"
    then: "全部 Tab 显示 6 张消费券，有效 Tab 显示 3 张，已使用 Tab 显示 2 张，已过期 Tab 显示 1 张"
    source: requirement
    confidence: high

  # Credit 卡消费券查询 - 边界场景
  - id: S006
    name: "边界查询-无消费券"
    type: boundary
    relates_to: AC002
    given: "用户没有任何消费券"
    when: "用户打开消费券列表页"
    then: "显示空状态'暂无消费券，快去消费赚取吧！'"
    source: supplement
    confidence: medium

  # Credit 卡消费券使用 - 正向场景
  - id: S007
    name: "正常使用-消费金额足够"
    type: positive
    relates_to: AC003
    given: "用户拥有一张 50 HKD 的消费券（ACTIVE），消费金额为 100 HKD"
    when: "用户选择使用消费券并完成支付"
    then: "实际支付 50 HKD，消费券状态变为 USED，用户收到 Push 通知'您已使用 50 HKD 消费券，实际支付 50 HKD'"
    source: requirement
    confidence: high

  # Credit 卡消费券使用 - 负向场景
  - id: S008
    name: "异常使用-消费金额不足"
    type: negative
    relates_to: AC003
    given: "用户拥有一张 50 HKD 的消费券（ACTIVE），消费金额为 30 HKD（< 50 HKD）"
    when: "用户选择使用消费券"
    then: "系统提示'消费金额不足，无法使用此消费券'，消费券状态不变"
    source: supplement
    confidence: medium

  - id: S009
    name: "异常使用-消费券已过期"
    type: negative
    relates_to: AC003
    given: "用户拥有一张 50 HKD 的消费券（EXPIRED），消费金额为 100 HKD"
    when: "用户选择使用消费券"
    then: "系统提示'消费券已过期'，无法使用"
    source: supplement
    confidence: medium

  - id: S010
    name: "异常使用-消费券已使用"
    type: negative
    relates_to: AC003
    given: "用户拥有一张 50 HKD 的消费券（USED），消费金额为 100 HKD"
    when: "用户选择使用消费券"
    then: "系统提示'消费券已使用'，无法再次使用"
    source: supplement
    confidence: medium

  # 消费券过期处理 - 正向场景
  - id: S011
    name: "正常过期-定时任务执行"
    type: positive
    relates_to: AC004
    given: "系统中存在 100 张过期的消费券（ACTIVE 状态，有效期已过）"
    when: "定时任务在每天凌晨 1 点执行"
    then: "100 张消费券状态全部变为 EXPIRED"
    source: requirement
    confidence: high

  # 消费券即将过期提醒 - 正向场景
  - id: S012
    name: "正常提醒-过期前3天"
    type: positive
    relates_to: AC005
    given: "用户拥有一张消费券，距离过期还有 3 天"
    when: "定时任务在每天上午 10 点执行"
    then: "用户收到 Push 提醒'您的 XX HKD 消费券将在 3 天后过期，记得使用哦'"
    source: requirement
    confidence: high

# ============================================
# 业务规则（Business Rules）- 从各章节提取
# ============================================
business_rules:
  - id: BR001
    rule: "Credit 卡消费金额必须 >= 100 HKD 才能获得消费回赠券"
    type: data_rule
    source: "PRD 第3章 3.2节 F001"
    confidence: high
    relates_to: [F001]

  - id: BR002
    rule: "消费回赠比例固定为 5%"
    type: calculation_rule
    source: "PRD 第3章 3.2节 F001"
    confidence: high
    relates_to: [F001]

  - id: BR003
    rule: "消费券有效期为 30 天"
    type: process_rule
    source: "PRD 第3章 3.2节 F004"
    confidence: high
    relates_to: [F004]

  - id: BR004
    rule: "一次消费只能使用一张消费券"
    type: process_rule
    source: "PRD 第3章 3.2节 F003"
    confidence: high
    relates_to: [F003]

  - id: BR005
    rule: "消费金额必须 >= 消费券金额（不支持部分使用）"
    type: data_rule
    source: "PRD 第3章 3.2节 F003"
    confidence: high
    relates_to: [F003]

  - id: BR006
    rule: "消费券过期后自动变为 EXPIRED 状态"
    type: process_rule
    source: "PRD 第3章 3.2节 F004"
    confidence: high
    relates_to: [F004]

  - id: BR007
    rule: "消费券使用后状态变为 USED，不可再次使用"
    type: process_rule
    source: "PRD 第3章 3.2节 F003"
    confidence: high
    relates_to: [F003]

  - id: BR008
    rule: "单笔消费使用消费券金额不超过 500 HKD"
    type: data_rule
    source: "PRD 第3章 3.7节 MMO001"
    confidence: high
    relates_to: [F003]

  - id: BR009
    rule: "单日使用消费券次数不超过 10 次"
    type: process_rule
    source: "PRD 第3章 3.7节 MMO001"
    confidence: high
    relates_to: [F003]

  - id: BR010
    rule: "单月使用消费券总额不超过 5000 HKD"
    type: process_rule
    source: "PRD 第3章 3.7节 MMO001"
    confidence: high
    relates_to: [F003]

