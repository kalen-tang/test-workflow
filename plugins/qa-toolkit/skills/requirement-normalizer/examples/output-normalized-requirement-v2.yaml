    suggested_solution: "建议增加 NOTIF004：消费券发放失败通知"

  - priority: medium
    action: "补充消费回赠比例变更的影响说明"
    reason: "missing_items 中记录的缺失内容，影响配置变更测试"
    suggested_solution: "建议明确：比例变更仅影响新发放的消费券，已发放的消费券金额不变"

  - priority: low
    action: "补充过期处理定时任务的执行时长要求"
    reason: "缺少性能指标，影响性能测试"
