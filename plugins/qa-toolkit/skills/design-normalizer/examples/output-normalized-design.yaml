# ============================================
# 第 5 章：分模块概要设计（核心章节）
# ============================================
module_design:

  # 接口设计
  interfaces:
    # 接口 1：查询消费券列表
    - id: IF001
      name: "查询消费券列表"
      microservice: "za-mks-points-service"
      path: "/api/v1/voucher/list"
      method: GET
      description: "查询用户的消费券列表，支持按卡类型筛选"

      request_params:
        - name: "userId"
          type: string
          required: true
          description: "用户ID"
          example: "123456"
          validation: "不能为空"

        - name: "cardType"
          type: string
          required: false
          description: "卡类型：DEBIT/CREDIT，不传则返回所有类型"
          example: "CREDIT"
          enum_values: ["DEBIT", "CREDIT"]
          default: "null"

        - name: "status"
          type: string
          required: false
          description: "消费券状态：ACTIVE/USED/EXPIRED，不传则返回所有状态"
          example: "ACTIVE"
          enum_values: ["ACTIVE", "USED", "EXPIRED"]
          default: "null"

        - name: "pageNo"
          type: integer
          required: false
          description: "页码，从 1 开始"
          example: 1
          default: 1

        - name: "pageSize"
          type: integer
          required: false
          description: "每页数量，最大 100"
          example: 20
          default: 20

      response_schema:
        success_response:
          - name: "code"
            type: string
            description: "响应码：0000 表示成功"
            example: "0000"

          - name: "message"
            type: string
            description: "响应消息"
            example: "Success"

          - name: "data"
            type: object
            description: "数据对象"
            children:
              - name: "total"
                type: integer
                description: "总数"
                example: 10

              - name: "vouchers"
                type: array
                description: "消费券列表"
                children:
                  - name: "voucherId"
                    type: string
                    description: "消费券ID"
                    example: "V202503180001"

                  - name: "userId"
                    type: string
                    description: "用户ID"
                    example: "123456"

                  - name: "cardType"
                    type: string
                    description: "卡类型：DEBIT/CREDIT"
                    example: "CREDIT"

                  - name: "amount"
                    type: number
                    description: "消费券金额（HKD）"
                    example: 10.00

                  - name: "status"
                    type: string
                    description: "状态：ACTIVE/USED/EXPIRED"
                    example: "ACTIVE"

                  - name: "sourceTransactionId"
                    type: string
                    description: "来源交易ID"
                    example: "TXN202503180001"

                  - name: "sourceTransactionAmount"
                    type: number
                    description: "来源交易金额（HKD）"
                    example: 200.00

                  - name: "sourceMerchant"
                    type: string
                    description: "来源商户名称"
                    example: "7-Eleven"

                  - name: "createTime"
                    type: string
                    description: "创建时间（ISO 8601）"
                    example: "2025-03-18T10:30:00+08:00"

                  - name: "expireTime"
                    type: string
                    description: "过期时间（ISO 8601）"
                    example: "2025-04-17T23:59:59+08:00"

                  - name: "usedTime"
                    type: string
                    description: "使用时间（ISO 8601），未使用则为 null"
                    example: null

        error_response:
          - error_code: "E001"
            description: "用户ID不能为空"
            http_status: 400

          - error_code: "E002"
            description: "cardType 参数非法（非 DEBIT/CREDIT）"
            http_status: 400

          - error_code: "E003"
            description: "status 参数非法（非 ACTIVE/USED/EXPIRED）"
            http_status: 400

          - error_code: "E999"
            description: "系统异常"
            http_status: 500

      business_rules:
        - "老版本 App（< V3.8.5）调用时，后台判断 App 版本，不返回 cardType=CREDIT 的消费券"
        - "按创建时间倒序排列（最新的在前）"
        - "分页查询，最大 pageSize=100"

      test_focus: true
      related_requirements: ["F002"]
      source: "设计文档 第5章"
      confidence: high

    # 接口 2：使用消费券
    - id: IF002
      name: "使用消费券"
      microservice: "za-mks-points-service"
      path: "/api/v1/voucher/use"
      method: POST
      description: "用户使用消费券进行消费抵扣"

      request_params:
        - name: "userId"
          type: string
          required: true
          description: "用户ID"
          example: "123456"

        - name: "voucherId"
          type: string
          required: true
          description: "消费券ID"
          example: "V202503180001"

        - name: "transactionId"
          type: string
          required: true
          description: "交易ID"
          example: "TXN202503180002"

        - name: "transactionAmount"
          type: number
          required: true
          description: "交易金额（HKD）"
          example: 100.00

      response_schema:
        success_response:
          - name: "code"
            type: string
            description: "响应码：0000 表示成功"
            example: "0000"

          - name: "message"
            type: string
            description: "响应消息"
            example: "Success"

          - name: "data"
            type: object
            description: "数据对象"
            children:
              - name: "voucherId"
                type: string
                description: "消费券ID"
                example: "V202503180001"

              - name: "voucherAmount"
                type: number
                description: "消费券金额（HKD）"
                example: 50.00

              - name: "actualAmount"
                type: number
                description: "实际支付金额（HKD）= 交易金额 - 消费券金额"
                example: 50.00

              - name: "usedTime"
                type: string
                description: "使用时间（ISO 8601）"
                example: "2025-03-18T11:00:00+08:00"

        error_response:
          - error_code: "E004"
            description: "消费券不存在"
            http_status: 400

          - error_code: "E005"
            description: "消费券已过期"
            http_status: 400

          - error_code: "E006"
            description: "消费券已使用"
            http_status: 400

          - error_code: "E007"
            description: "交易金额不足（< 消费券金额）"
            http_status: 400

          - error_code: "E008"
            description: "消费券与用户不匹配"
            http_status: 403

          - error_code: "E009"
            description: "单笔消费使用消费券金额超过限额（> 500 HKD）"
            http_status: 403

          - error_code: "E010"
            description: "单日使用消费券次数超限（> 10 次）"
            http_status: 429

          - error_code: "E011"
            description: "单月使用消费券总额超限（> 5000 HKD）"
            http_status: 429

          - error_code: "E999"
            description: "系统异常"
            http_status: 500

      business_rules:
        - "消费券状态必须为 ACTIVE"
        - "消费券有效期内才能使用"
        - "交易金额必须 >= 消费券金额"
        - "一次交易只能使用一张消费券"
        - "使用后消费券状态变为 USED"
        - "风控限制：单笔 <= 500 HKD，单日 <= 10 次，单月 <= 5000 HKD"

      test_focus: true
      related_requirements: ["F003"]
      source: "设计文档 第5章"
      confidence: high

    # 接口 3：消费券发放（内部接口）
    - id: IF003
      name: "消费券发放（内部接口）"
      microservice: "za-mks-points-service"
      path: "/api/internal/v1/voucher/issue"
      method: POST
      description: "接收消费事件，自动发放消费回赠券（内部接口，不对外暴露）"

      request_params:
        - name: "userId"
          type: string
          required: true
          description: "用户ID"
          example: "123456"

        - name: "cardType"
          type: string
          required: true
          description: "卡类型：DEBIT/CREDIT"
          example: "CREDIT"

        - name: "transactionId"
          type: string
          required: true
          description: "交易ID"
          example: "TXN202503180001"

        - name: "transactionAmount"
          type: number
          required: true
          description: "交易金额（HKD）"
          example: 200.00

        - name: "merchantId"
          type: string
          required: true
          description: "商户ID"
          example: "M001"

        - name: "merchantName"
          type: string
          required: true
          description: "商户名称"
          example: "7-Eleven"

        - name: "transactionTime"
          type: string
          required: true
          description: "交易时间（ISO 8601）"
          example: "2025-03-18T10:30:00+08:00"

      response_schema:
        success_response:
          - name: "code"
            type: string
            example: "0000"

          - name: "message"
            type: string
            example: "Success"

          - name: "data"
            type: object
            children:
              - name: "voucherId"
                type: string
                description: "消费券ID"
                example: "V202503180001"

              - name: "voucherAmount"
                type: number
                description: "消费券金额（HKD）"
                example: 10.00

              - name: "expireTime"
                type: string
                description: "过期时间（ISO 8601）"
                example: "2025-04-17T23:59:59+08:00"

        error_response:
          - error_code: "E012"
            description: "卡类型不支持（非 DEBIT/CREDIT）"
            http_status: 400

          - error_code: "E013"
            description: "交易金额不足（< 100 HKD）"
            http_status: 400

          - error_code: "E014"
            description: "商户不合资格"
            http_status: 400

          - error_code: "E015"
            description: "Credit 卡消费券功能未开启（开关关闭）"
            http_status: 403

          - error_code: "E999"
            description: "系统异常"
            http_status: 500

      business_rules:
        - "消费金额 >= 100 HKD"
        - "商户必须在合资格商户列表中"
        - "回赠金额 = 消费金额 × 5%"
        - "消费券有效期 = 发放时间 + 30 天"
        - "Credit 卡消费券开关关闭时，拒绝发放"

      test_focus: true
      related_requirements: ["F001"]
      source: "设计文档 第5章"
      confidence: high

  # 数据库设计
  database_design:
    tables:
      - table_name: "t_voucher"
        description: "消费券表"
        operation: "modify"
        fields:
          - name: "id"
            type: "bigint"
            nullable: false
            primary_key: true
            auto_increment: true
            description: "主键ID"

          - name: "voucher_id"
            type: "varchar(32)"
            nullable: false
            unique: true
            description: "消费券ID"

          - name: "user_id"
            type: "varchar(32)"
            nullable: false
            index: true
            description: "用户ID"

          - name: "card_type"
            type: "varchar(16)"
            nullable: false
            description: "卡类型：DEBIT/CREDIT"
            default: "DEBIT"
            comment: "【本次新增字段】"

          - name: "amount"
            type: "decimal(10,2)"
            nullable: false
            description: "消费券金额（HKD）"

          - name: "status"
            type: "varchar(16)"
            nullable: false
            description: "状态：ACTIVE/USED/EXPIRED"
            default: "ACTIVE"

          - name: "source_transaction_id"
            type: "varchar(32)"
            nullable: false
            description: "来源交易ID"

          - name: "source_transaction_amount"
            type: "decimal(10,2)"
            nullable: false
            description: "来源交易金额（HKD）"

          - name: "source_merchant_id"
            type: "varchar(32)"
            nullable: false
            description: "来源商户ID"

          - name: "source_merchant_name"
            type: "varchar(128)"
            nullable: false
            description: "来源商户名称"

          - name: "create_time"
            type: "datetime"
            nullable: false
            description: "创建时间"

          - name: "expire_time"
            type: "datetime"
            nullable: false
            description: "过期时间"

          - name: "used_time"
            type: "datetime"
            nullable: true
            description: "使用时间"

          - name: "update_time"
            type: "datetime"
            nullable: false
            description: "更新时间"

        indexes:
          - name: "idx_user_card_type"
            columns: ["user_id", "card_type"]
            type: "BTREE"
            comment: "【本次新增索引】按用户ID和卡类型查询"

          - name: "idx_status_expire_time"
            columns: ["status", "expire_time"]
            type: "BTREE"
            comment: "定时任务扫描过期消费券"

        ddl: |
          -- 新增 card_type 字段
          ALTER TABLE t_voucher ADD COLUMN card_type varchar(16) NOT NULL DEFAULT 'DEBIT' COMMENT '卡类型：DEBIT/CREDIT';

          -- 新增索引
          CREATE INDEX idx_user_card_type ON t_voucher(user_id, card_type);

        dml: |
          -- 存量数据补充 card_type（默认为 DEBIT）
          UPDATE t_voucher SET card_type = 'DEBIT' WHERE card_type IS NULL OR card_type = '';

        source: "设计文档 第10.2章 SQL物料"

# ============================================
# 第 6 章：整体兼容性分析
# ============================================
compatibility_analysis:

  # 6.1 上游调用方分析
  upstream_callers:
    - service: "za-app-service"
      description: "App 端调用消费券查询接口"
      impact: "需要传递新的 cardType 参数（可选）"
      compatibility: "向后兼容（cardType 不传时，返回所有类型消费券）"

  # 6.2 下游被调用方分析
  downstream_callees:
    - service: "za-risk-service"
      description: "风控服务"
      impact: "需要支持 CREDIT 卡类型的风控规则"
      compatibility: "需要升级风控规则，支持 cardType 参数"

  # 6.3 App 兼容性分析
  app_compatibility:
    old_app_new_code:
      compatible: true
      description: "不涉及"

    old_app_new_data:
      compatible: true
      description: |
        后台在风控下发的 ms+da 判断 app 版本，低版本 app 降级到 ms 验证。

        具体策略：
        - 老版本 App（< V3.8.5）调用 /voucher/list 接口时，后台判断 App 版本
        - 如果版本 < V3.8.5，不返回 cardType=CREDIT 的消费券
        - 确保老版本 App 用户看不到 Credit 卡消费券
      test_scenarios:
        - scenario: "老版本 App（V3.8.0）查询消费券列表"
          given: "用户拥有 2 张 DEBIT 卡消费券、1 张 CREDIT 卡消费券"
          expected: "只返回 2 张 DEBIT 卡消费券，不返回 CREDIT 卡消费券"

        - scenario: "新版本 App（V3.8.5）查询消费券列表"
          given: "用户拥有 2 张 DEBIT 卡消费券、1 张 CREDIT 卡消费券"
          expected: "返回全部 3 张消费券"

    new_app_old_data:
      compatible: true
      description: "不涉及（存量数据通过 DML 补充 card_type=DEBIT）"

  # 6.4 数据兼容性分析
  data_compatibility:
    new_data_old_code:
      compatible: true
      description: "详见 6.3.2"

    new_code_old_data:
      compatible: true
      description: "详见 6.3.3"

  # 6.5 后管兼容性分析
  backend_compatibility:
    compatible: true
    description: "不涉及后管变更"

  # 6.6 发布机房兼容性分析
  deployment_compatibility:
    new_old_room_traffic:
      compatible: true
      description: "前后向都兼容，发布顺序无影响"

    deployment_traffic_switch:
      compatible: true
      description: "前后向都兼容，发布顺序无影响"

    deployment_sequence:
      compatible: true
      description: "前后向都兼容，发布顺序无影响"

# ============================================
# 第 7 章：兼容性方案
# ============================================
compatibility_solution:
  description: "不涉及"
  solutions: []

# ============================================
# 第 8 章：业务降级和数据一致性梳理
# ============================================
degradation_and_consistency:
  upstream_downstream_diagram: |
    上下游调用关系：

    za-payment-service（支付服务）
        ↓ 消费事件（MQ）
    za-mks-points-service（消费券服务）
        ↓ 查询合资格商户
    za-merchant-service（商户服务）
        ↓ 风控校验
    za-risk-service（风控服务）
        ↓ 发送通知
    za-notification-service（通知服务）

  degradation_scenarios:
    - scenario: "商户服务降级"
      trigger: "za-merchant-service 不可用"
      action: "降级到本地缓存的合资格商户列表"
      data_consistency: "缓存更新策略：每 5 分钟从 za-merchant-service 拉取最新商户列表"
      test_points:
        - "验证商户服务不可用时，使用本地缓存"
        - "验证缓存过期后，重新拉取商户列表"
        - "验证商户服务恢复后，切换到实时查询"

    - scenario: "风控服务降级"
      trigger: "za-risk-service 不可用或响应超时（> 2秒）"
      action: "降级到默认风控规则（单笔 <= 500 HKD，单日 <= 10 次，单月 <= 5000 HKD）"
      data_consistency: "使用本地计数器记录用户当日和当月使用次数，确保风控限制有效"
      test_points:
        - "验证风控服务超时时，降级到默认规则"
        - "验证降级后风控限制仍然生效"
        - "验证风控服务恢复后，切换到实时风控"

    - scenario: "通知服务降级"
      trigger: "za-notification-service 不可用"
      action: "不阻塞消费券发放和使用流程，通知失败记录到日志，异步重试"
      data_consistency: "通知失败记录到 t_notification_failed 表，定时任务异步重试（最多 3 次）"
      test_points:
        - "验证通知服务不可用时，消费券发放和使用流程不受影响"
        - "验证通知失败记录到失败表"
