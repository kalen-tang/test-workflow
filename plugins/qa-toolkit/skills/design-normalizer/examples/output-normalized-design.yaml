# ============================================
# 第 11 章：测试重点关注要点列举
# ============================================
test_focus_points:
  - id: TEST001
    point: "Credit 卡消费券发放"
    description: |
      验证 Credit 卡消费后，系统能够正确发放消费回赠券。

      关键测试场景：
      - 正常发放（消费金额 >= 100 HKD，合资格商户）
      - 异常发放（消费金额 < 100 HKD，非合资格商户）
      - 开关控制（开关关闭时不发放）
      - 回赠金额计算准确性（5%）
      - 消费券有效期正确性（30 天）
    priority: high
    test_types: ["功能测试", "业务流程测试"]

  - id: TEST002
    point: "老版本 App 兼容性"
    description: |
      验证老版本 App（< V3.8.5）不会看到 Credit 卡消费券。

      关键测试场景：
      - 老版本 App 查询消费券列表，不返回 cardType=CREDIT 的消费券
      - 新版本 App 查询消费券列表，返回所有类型消费券
      - 老版本 App 强制升级策略
      - 中间版本 App 热更新策略
    priority: high
    test_types: ["兼容性测试"]

  - id: TEST003
    point: "消费券使用流程"
    description: |
      验证 Credit 卡消费券的使用流程完整且正确。

      关键测试场景：
      - 正常使用（交易金额 >= 消费券金额）
      - 异常使用（交易金额 < 消费券金额，消费券已过期，消费券已使用）
      - 风控限制（单笔、单日、单月限额）
      - 实际支付金额计算准确性
    priority: high
    test_types: ["功能测试", "业务流程测试"]

  - id: TEST004
    point: "数据库变更兼容性"
    description: |
      验证 t_voucher 表新增 card_type 字段后，存量数据和新增数据的兼容性。

      关键测试场景：
      - 存量数据 card_type 默认为 DEBIT
      - 新增数据 card_type 正确（DEBIT/CREDIT）
      - 索引 idx_user_card_type 查询性能
    priority: medium
    test_types: ["数据库测试", "性能测试"]

  - id: TEST005
    point: "降级场景"
    description: |
      验证各个降级场景的正确性和数据一致性。

      关键测试场景：
      - 商户服务降级（使用本地缓存）
      - 风控服务降级（使用默认规则）
      - 通知服务降级（不阻塞主流程，异步重试）
    priority: medium
    test_types: ["降级测试", "异常测试"]

  - id: TEST006
    point: "性能测试"
    description: |
      验证消费券相关接口的性能指标。

      关键性能指标：
      - 消费券发放响应时间 < 2秒
      - 消费券查询响应时间 < 500ms
      - 消费券使用响应时间 < 1秒
      - 峰值吞吐 > 500TPS
    priority: medium
    test_types: ["性能测试"]

