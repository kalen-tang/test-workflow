# ============================================
# 第 1 章：需求背景描述
# ============================================
requirement_background:
  background: |
    原卡消费回赠券需求设计文档：卡消费回赠券需求

    本次需求在原有基础上，新增 Credit 消费场景支持。主要变更：
    1. 支持 Credit 卡消费后发放消费回赠券
    2. 支持 Credit 卡消费券的查询和使用
    3. 兼容老版本 App（低版本 App 不展示 Credit 卡消费券）

  features_and_effects: |
    功能简介：
    - Credit 卡用户在合资格商户消费后，自动获得消费回赠券
    - Credit 卡用户可以查询和使用消费券

    业务效果：
    - 预期 Credit 卡用户活动参与率从 12% 提升至 40%
    - 预期 Credit 卡月均消费笔数提升 20%

# ============================================
# 第 2 章：整体设计概要
# ============================================
design_overview: |
  本次需求主要涉及以下模块：

  1. 消费券发放服务（za-mks-points-service）
     - 新增 Credit 卡消费事件监听
     - 新增 Credit 卡消费券发放逻辑

  2. 消费券查询服务（za-mks-points-service）
     - 新增 cardType 参数支持
     - 兼容老版本 App（不返回 Credit 卡消费券）

  3. 消费券使用服务（za-mks-points-service）
     - 兼容 Credit 卡消费券使用

  4. 数据库变更
     - t_voucher 表新增 card_type 字段

  5. 配置变更
     - Apollo 新增开关：credit_voucher_enabled
     - DBFF 新增接口权限配置

  整体设计遵循向后兼容原则，老版本 App 不受影响。

# ============================================
# 第 3 章：架构变更及评审
# ============================================
